<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertidor MP3</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            background: linear-gradient(180deg, #0a1628 0%, #0d2137 30%, #0f2d4a 60%, #122d4a 100%);
            color: #e0f0ff;
            overflow-x: hidden;
            position: relative;
        }

        .bubbles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .bubble {
            position: absolute;
            bottom: -50px;
            background: radial-gradient(circle at 30% 30%, rgba(100, 200, 255, 0.15), rgba(50, 150, 200, 0.05));
            border: 1px solid rgba(100, 200, 255, 0.1);
            border-radius: 50%;
            animation: rise linear infinite;
        }

        .bubble:nth-child(1) { width: 40px; height: 40px; left: 10%; animation-duration: 15s; animation-delay: 0s; }
        .bubble:nth-child(2) { width: 20px; height: 20px; left: 20%; animation-duration: 12s; animation-delay: 2s; }
        .bubble:nth-child(3) { width: 50px; height: 50px; left: 35%; animation-duration: 18s; animation-delay: 1s; }
        .bubble:nth-child(4) { width: 30px; height: 30px; left: 50%; animation-duration: 14s; animation-delay: 3s; }
        .bubble:nth-child(5) { width: 25px; height: 25px; left: 65%; animation-duration: 16s; animation-delay: 0.5s; }
        .bubble:nth-child(6) { width: 45px; height: 45px; left: 80%; animation-duration: 20s; animation-delay: 2.5s; }
        .bubble:nth-child(7) { width: 15px; height: 15px; left: 90%; animation-duration: 11s; animation-delay: 1.5s; }
        .bubble:nth-child(8) { width: 35px; height: 35px; left: 5%; animation-duration: 17s; animation-delay: 4s; }

        @keyframes rise {
            0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-110vh) translateX(30px) scale(0.5); opacity: 0; }
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-3d {
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
            position: relative;
            perspective: 500px;
        }

        .logo-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotateY(0deg); }
            50% { transform: translateY(-10px) rotateY(10deg); }
        }

        .logo-face {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            font-size: 50px;
            font-weight: bold;
            backface-visibility: visible;
        }

        .logo-front {
            background: linear-gradient(145deg, #0097a7, #00bcd4, #00e5ff);
            box-shadow: 
                0 15px 35px rgba(0, 188, 212, 0.4),
                0 0 60px rgba(0, 188, 212, 0.3),
                inset 0 2px 0 rgba(255, 255, 255, 0.3),
                inset 0 -2px 0 rgba(0, 0, 0, 0.2);
            color: white;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(100, 255, 255, 0.3);
        }

        .logo-shadow {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 15px;
            background: radial-gradient(ellipse, rgba(0, 188, 212, 0.4), transparent);
            filter: blur(5px);
            animation: shadow 3s ease-in-out infinite;
        }

        @keyframes shadow {
            0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.5; }
            50% { transform: translateX(-50%) scale(0.8); opacity: 0.3; }
        }

        .logo-glow {
            position: absolute;
            width: 120%;
            height: 120%;
            top: -10%;
            left: -10%;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.2), transparent 70%);
            animation: pulse 2s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            background: linear-gradient(135deg, #4fc3f7, #00e5ff, #18ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #64b5f6;
            font-size: 1rem;
            margin-top: 5px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .panel {
            background: linear-gradient(145deg, rgba(10, 30, 60, 0.9), rgba(5, 20, 40, 0.95));
            border: 1px solid rgba(30, 100, 180, 0.3);
            border-radius: 20px;
            padding: 35px;
            margin-bottom: 25px;
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(100, 200, 255, 0.1),
                0 0 60px rgba(0, 100, 200, 0.1);
            backdrop-filter: blur(10px);
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #64b5f6;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .url-input {
            width: 100%;
            padding: 16px 20px;
            font-size: 1rem;
            font-family: 'Rajdhani', sans-serif;
            background: rgba(0, 20, 50, 0.6);
            border: 2px solid rgba(30, 100, 180, 0.3);
            border-radius: 12px;
            color: #e0f0ff;
            outline: none;
            transition: all 0.3s ease;
        }

        .url-input:focus {
            border-color: #00bcd4;
            box-shadow: 0 0 20px rgba(0, 188, 212, 0.2);
        }

        .url-input::placeholder {
            color: rgba(100, 180, 255, 0.3);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 14px 35px;
            font-size: 1rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-convert {
            background: linear-gradient(135deg, #00897b, #00acc1, #00bcd4);
            color: white;
            box-shadow: 0 4px 20px rgba(0, 188, 212, 0.4);
        }

        .btn-convert:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 188, 212, 0.6);
        }

        .btn-convert:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-play {
            background: linear-gradient(135deg, #1565c0, #1976d2, #2196f3);
            color: white;
            box-shadow: 0 4px 20px rgba(33, 150, 243, 0.4);
        }

        .btn-play:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(33, 150, 243, 0.6);
        }

        .btn-play:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress-container {
            margin-top: 25px;
            display: none;
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: rgba(0, 30, 60, 0.8);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00bcd4, #18ffff, #4fc3f7);
            border-radius: 10px;
            transition: width 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 188, 212, 0.5);
        }

        .status-text {
            text-align: center;
            font-size: 0.95rem;
            color: #80deea;
            min-height: 24px;
        }

        .result {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 50, 80, 0.4);
            border-radius: 12px;
            border-left: 4px solid #00bcd4;
            display: none;
        }

        .result.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .result.error {
            border-left-color: #f44336;
            background: rgba(80, 20, 20, 0.4);
        }

        .result.success {
            border-left-color: #4caf50;
            background: rgba(20, 60, 30, 0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .files-section {
            margin-top: 30px;
        }

        .files-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: #4fc3f7;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .file-list {
            max-height: 250px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #1565c0 #0a1628;
        }

        .file-list::-webkit-scrollbar {
            width: 6px;
        }

        .file-list::-webkit-scrollbar-track {
            background: #0a1628;
        }

        .file-list::-webkit-scrollbar-thumb {
            background: #1565c0;
            border-radius: 3px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(0, 30, 60, 0.4);
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.2s ease;
        }

        .file-item:hover {
            background: rgba(0, 50, 80, 0.6);
        }

        .file-name {
            font-size: 0.9rem;
            color: #b3e5fc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 80%;
        }

        .file-play-btn {
            padding: 6px 12px;
            font-size: 0.75rem;
            background: rgba(33, 150, 243, 0.3);
            border: 1px solid rgba(33, 150, 243, 0.5);
            color: #64b5f6;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .file-play-btn:hover {
            background: rgba(33, 150, 243, 0.5);
            color: white;
        }

        .sonar {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 80px;
            height: 80px;
            z-index: 10;
        }

        .sonar-circle {
            position: absolute;
            border: 2px solid rgba(0, 188, 212, 0.3);
            border-radius: 50%;
            animation: sonar 3s ease-out infinite;
        }

        .sonar-circle:nth-child(1) { width: 40px; height: 40px; top: 20px; left: 20px; animation-delay: 0s; }
        .sonar-circle:nth-child(2) { width: 60px; height: 60px; top: 10px; left: 10px; animation-delay: 0.5s; }
        .sonar-circle:nth-child(3) { width: 80px; height: 80px; top: 0; left: 0; animation-delay: 1s; }

        @keyframes sonar {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .depth-indicator {
            position: fixed;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: rgba(0, 188, 212, 0.3);
            letter-spacing: 3px;
            z-index: 10;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .panel { padding: 25px 20px; }
            .btn-group { flex-direction: column; }
            .btn { width: 100%; }
            .depth-indicator { display: none; }
        }
    </style>
</head>
<body>
    <div class="bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <div class="depth-indicator">CONVERSOR SUBMARINO v1.0</div>

    <div class="container">
        <div class="header">
            <div class="logo-3d">
                <div class="logo-glow"></div>
                <div class="logo-inner">
                    <div class="logo-face logo-front">MP3</div>
                </div>
                <div class="logo-shadow"></div>
            </div>
            <h1>CONVERTIDOR MP3</h1>
            <div class="subtitle">Tu mejor convertidor</div>
        </div>

        <div class="panel">
            <div class="input-group">
                <label>&#x1F310; URL del Video o Playlist</label>
                <input type="text" class="url-input" id="urlInput" 
                       placeholder="https://www.youtube.com/watch?v=...">
            </div>

            <div class="btn-group">
                <button class="btn btn-convert" id="btnConvert" onclick="convertir()">
                    &#x25B6; Convertir
                </button>
                <button class="btn btn-play" id="btnPlay" onclick="reproducir()" disabled>
                    &#x266B; Reproducir
                </button>
            </div>

            <div class="progress-container" id="progressContainer">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
                <div class="status-text" id="statusText">Iniciando...</div>
            </div>

            <div class="result" id="resultBox"></div>
        </div>

        <div class="panel files-section">
            <div class="files-title">&#x1F3B6; Archivos Descargados</div>
            <div class="file-list" id="fileList">
                <div style="text-align: center; color: #4a6a8a; padding: 20px;">
                    Cargando archivos...
                </div>
            </div>
        </div>
    </div>

    <div class="sonar">
        <div class="sonar-circle"></div>
        <div class="sonar-circle"></div>
        <div class="sonar-circle"></div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        let ultimoArchivo = null;
        let archivosDescargados = [];

        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') convertir();
        });

        async function convertir() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                mostrarResultado('Por favor ingresa una URL', 'error');
                return;
            }

            const btnConvert = document.getElementById('btnConvert');
            const btnPlay = document.getElementById('btnPlay');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const statusText = document.getElementById('statusText');

            btnConvert.disabled = true;
            btnPlay.disabled = true;
            progressContainer.classList.add('active');
            progressBar.style.width = '0%';
            statusText.textContent = 'Conectando al servidor...';

            let progress = 0;
            const progressInterval = setInterval(() => {
                if (progress < 90) {
                    progress += Math.random() * 3;
                    progressBar.style.width = progress + '%';
                }
            }, 500);

            try {
                statusText.textContent = 'Obteniendo información del video...';
                
                const response = await fetch('/convertir', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                clearInterval(progressInterval);
                progressBar.style.width = '100%';

                const data = await response.json();

                if (response.ok) {
                    statusText.textContent = 'Conversión completada';
                    
                    if (data.es_playlist) {
                        mostrarResultado(`${data.mensaje} en carpeta 'musica'`, 'success');
                        ultimoArchivo = data.primer_archivo;
                    } else {
                        mostrarResultado(data.mensaje, 'success');
                        ultimoArchivo = data.archivo;
                    }

                    btnPlay.disabled = false;
                    cargarArchivos();
                } else {
                    statusText.textContent = 'Error en la conversión';
                    mostrarResultado(data.error, 'error');
                }
            } catch (error) {
                clearInterval(progressInterval);
                statusText.textContent = 'Error de conexión';
                mostrarResultado('Error al conectar con el servidor', 'error');
            }

            btnConvert.disabled = false;
        }

        function mostrarResultado(mensaje, tipo) {
            const resultBox = document.getElementById('resultBox');
            resultBox.textContent = mensaje;
            resultBox.className = 'result active ' + tipo;
        }

        function reproducir() {
            if (ultimoArchivo) {
                const audio = document.getElementById('audioPlayer');
                audio.src = '/musica/' + encodeURIComponent(ultimoArchivo);
                audio.play();
                mostrarResultado('Reproduciendo: ' + ultimoArchivo.replace('.mp3', ''), 'success');
            }
        }

        async function cargarArchivos() {
            try {
                const response = await fetch('/archivos');
                const archivos = await response.json();
                const fileList = document.getElementById('fileList');
                
                if (archivos.length === 0) {
                    fileList.innerHTML = '<div style="text-align: center; color: #4a6a8a; padding: 20px;">No hay archivos descargados</div>';
                    return;
                }

                fileList.innerHTML = archivos.map(archivo => `
                    <div class="file-item">
                        <span class="file-name" title="${archivo}">${archivo.replace('.mp3', '')}</span>
                        <button class="file-play-btn" onclick="reproducirArchivo('${archivo.replace(/'/g, "\\'")}')">&#x25B6; Play</button>
                    </div>
                `).join('');

                archivosDescargados = archivos;
            } catch (error) {
                console.error('Error cargando archivos:', error);
            }
        }

        function reproducirArchivo(archivo) {
            const audio = document.getElementById('audioPlayer');
            audio.src = '/musica/' + encodeURIComponent(archivo);
            audio.play();
            ultimoArchivo = archivo;
            mostrarResultado('Reproduciendo: ' + archivo.replace('.mp3', ''), 'success');
        }

        window.onload = cargarArchivos;
    </script>
</body>
</html>
